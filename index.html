<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trang chủ - Hệ thống thử nghiệm tư vấn vị trí việc làm</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="home-page">
  <div class="page-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <a href="index.html" class="brand-title">Job Position Advisor</a>

        <nav class="top-nav">
          <a class="top-nav-link active" href="index.html">Trang chủ</a>
          <a class="top-nav-link" href="pages/jobs.html">Việc làm</a>
          <a class="top-nav-link" href="pages/position-profile.html">Hồ sơ vị trí</a>
          <a class="top-nav-link" href="pages/upload-profile.html">Hồ sơ cá nhân</a>
        </nav>
      </div>
    </header>

    <main class="hero-stage">
      <div class="container hero-container">
        <section class="hero-content">
          <h1 class="hero-title">Hệ thống thử nghiệm tư vấn vị trí việc làm</h1>

          <p class="hero-subtitle">
            Tìm kiếm vị trí việc làm theo từ khóa hoặc khám phá theo lĩnh vực.
          </p>

          <div class="search-panel">
            <div class="search-wrapper">
              <div class="search-icon">
                <i class="bi bi-search"></i>
              </div>

              <input
                type="text"
                id="searchInput"
                class="form-control search-input"
                placeholder="Tìm kiếm vị trí việc làm"
                autocomplete="off"
              />

              <button id="searchBtn" class="btn search-btn" type="button">
                Tìm kiếm
              </button>
            </div>

            <div id="searchSuggestions" class="suggestion-box d-none"></div>
          </div>

          <section class="field-panel">
            <h2 class="field-panel-title">Lĩnh vực</h2>

            <div class="field-grid">
              <button class="field-card field-tag" data-field="Khoa học thông tin" type="button">
                <span class="field-folder-icon">
                  <i class="bi bi-folder-fill"></i>
                </span>
                <span class="field-name">Khoa học thông tin</span>
              </button>

              <button class="field-card field-tag" data-field="Công nghệ thông tin - truyền thông" type="button">
                <span class="field-folder-icon">
                  <i class="bi bi-folder-fill"></i>
                </span>
                <span class="field-name">Công nghệ thông tin - truyền thông</span>
              </button>

              <button class="field-card field-tag" data-field="Quản lý" type="button">
                <span class="field-folder-icon">
                  <i class="bi bi-folder-fill"></i>
                </span>
                <span class="field-name">Quản lý</span>
              </button>
            </div>
          </section>

          <section id="fieldPreview" class="field-preview d-none" aria-live="polite">
            <div class="field-preview-header">
              <h5 id="fieldPreviewTitle" class="mb-0"></h5>
              <button id="closeFieldPreview" class="btn-close-preview" type="button">
                Đóng
              </button>
            </div>

            <div id="fieldPreviewList" class="field-preview-list"></div>
          </section>
        </section>
      </div>
    </main>
  </div>

  <script src="assets/js/app.js"></script>
</body>
</html>
