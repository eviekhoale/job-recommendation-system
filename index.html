<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trang chủ - Hệ thống thử nghiệm tư vấn vị trí việc làm</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="page-overlay">
    <nav class="navbar navbar-expand-lg custom-navbar px-4 px-lg-5">
      <div class="container-fluid px-0">
        <a class="navbar-brand brand-title" href="index.html">Job Position Advisor</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
          <div class="navbar-nav ms-auto gap-lg-2 mt-3 mt-lg-0">
            <a class="nav-link nav-pill active" href="index.html">Trang chủ</a>
            <a class="nav-link nav-pill" href="pages/jobs.html">Việc làm</a>
            <a class="nav-link nav-pill" href="pages/position-profile.html">Hồ sơ vị trí</a>
            <a class="nav-link nav-pill" href="pages/upload-profile.html">Hồ sơ cá nhân</a>
          </div>
        </div>
      </div>
    </nav>

    <main>
      <section class="hero-section">
        <div class="container hero-container">
          <div class="hero-box">
            <div class="row align-items-center g-4 g-xl-5">
              <div class="col-lg-7">
                <div class="hero-content">
                  <h1 class="hero-title">
                    Hệ thống thử nghiệm tư vấn vị trí việc làm
                  </h1>

                  <div class="search-panel mt-4">
                    <div class="search-wrapper">
                      <div class="search-icon">⌕</div>
                      <input
                        type="text"
                        id="searchInput"
                        class="form-control search-input"
                        placeholder="Tìm kiếm vị trí việc làm"
                        autocomplete="off"
                      >
                      <button id="searchBtn" class="btn search-btn" type="button">Tìm kiếm</button>
                    </div>

                    <div id="searchSuggestions" class="suggestion-box d-none"></div>

                    <div class="search-helper mt-4">
                      <div class="helper-group">
                        <p class="helper-title">Lĩnh vực</p>

                        <div class="field-grid">
                          <button class="field-tag field-card" data-field="Khoa học thông tin">
                            <span class="field-icon">📚</span>
                            <span class="field-text">Khoa học thông tin</span>
                          </button>

                          <button class="field-tag field-card" data-field="Công nghệ thông tin - truyền thông">
                            <span class="field-icon">💻</span>
                            <span class="field-text">Công nghệ thông tin - truyền thông</span>
                          </button>

                          <button class="field-tag field-card" data-field="Quản lý">
                            <span class="field-icon">🗂️</span>
                            <span class="field-text">Quản lý</span>
                          </button>
                        </div>
                      </div>
                    </div>

                    <div id="fieldPreview" class="field-preview d-none mt-4">
                      <div class="field-preview-header">
                        <h5 id="fieldPreviewTitle" class="mb-0"></h5>
                        <button id="closeFieldPreview" class="btn-close-preview" type="button">Đóng</button>
                      </div>

                      <div id="fieldPreviewList" class="field-preview-list mt-3"></div>
                    </div>
                  </div>
                </div>
              </div>

            </div>
          </div>  
        </div>
      </section>
    </main>
  </div>

  <script src="assets/js/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
