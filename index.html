<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trang chủ - Hệ thống thử nghiệm tư vấn vị trí việc làm</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="page-overlay">
    <header class="topbar">
      <div class="brand-chip">
        <span class="brand-dot"></span>
        <a href="index.html" class="brand-link">Job Position Advisor</a>
      </div>

      <nav class="nav-chip">
        <a class="nav-link active" href="index.html">Trang chủ</a>
        <a class="nav-link" href="pages/jobs.html">Việc làm</a>
        <a class="nav-link" href="pages/position-profile.html">Hồ sơ vị trí</a>
        <a class="nav-link" href="pages/upload-profile.html">Hồ sơ cá nhân</a>
      </nav>
    </header>

    <main class="hero-stage">
      <div class="container hero-container">
        <div class="hero-stack">
          <div class="hero-heading text-center">
            <h1 class="hero-title">Hệ thống thử nghiệm tư vấn vị trí việc làm</h1>
            <p class="hero-subtitle">
              Tìm kiếm vị trí việc làm theo từ khóa hoặc khám phá theo lĩnh vực.
            </p>
          </div>

          <div class="search-panel">
            <div class="search-wrapper">
              <div class="search-icon">
                <i class="bi bi-search"></i>
              </div>

              <input
                type="text"
                id="searchInput"
                class="form-control search-input"
                placeholder="Tìm kiếm vị trí việc làm"
                autocomplete="off"
              >

              <button id="searchBtn" class="btn search-btn" type="button">
                Tìm kiếm
              </button>
            </div>

            <div id="searchSuggestions" class="suggestion-box d-none"></div>
          </div>

          <section class="field-panel">
            <h3 class="field-panel-title">Khám phá theo lĩnh vực</h3>

            <div class="field-grid">
              <button class="field-tag field-card" data-field="Khoa học thông tin">
                <span class="field-icon-circle">
                  <i class="bi bi-journal-bookmark-fill"></i>
                </span>
                <span class="field-text">Khoa học thông tin</span>
              </button>

              <button class="field-tag field-card" data-field="Công nghệ thông tin - truyền thông">
                <span class="field-icon-circle">
                  <i class="bi bi-laptop"></i>
                </span>
                <span class="field-text">Công nghệ thông tin - truyền thông</span>
              </button>

              <button class="field-tag field-card" data-field="Quản lý">
                <span class="field-icon-circle">
                  <i class="bi bi-folder2-open"></i>
                </span>
                <span class="field-text">Quản lý</span>
              </button>
            </div>
          </section>

          <div id="fieldPreview" class="field-preview d-none">
            <div class="field-preview-header">
              <h5 id="fieldPreviewTitle" class="mb-0"></h5>
              <button id="closeFieldPreview" class="btn-close-preview" type="button">Đóng</button>
            </div>

            <div id="fieldPreviewList" class="field-preview-list mt-3"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="assets/js/app.js"></script>
</body>
</html>
