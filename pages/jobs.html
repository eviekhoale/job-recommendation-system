<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Việc làm - Job Position Advisor</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <a href="../index.html" class="brand-title">Job Position Advisor</a>

        <nav class="top-nav">
          <a class="top-nav-link" href="../index.html">Trang chủ</a>
          <a class="top-nav-link active" href="jobs.html">Việc làm</a>
          <a class="top-nav-link" href="position-profile.html">Hồ sơ vị trí</a>
          <a class="top-nav-link" href="upload-profile.html">Hồ sơ cá nhân</a>
        </nav>
      </div>
    </header>

    <main class="jobs-page">
      <section class="jobs-stage">
        <div class="jobs-container">
          <div class="jobs-content">
            <h1 class="jobs-title">Tra cứu vị trí việc làm</h1>

            <div class="jobs-search-panel">
              <div class="jobs-search-wrapper">
                <div class="jobs-search-icon">⌕</div>
                <input
                  type="text"
                  id="jobSearchInput"
                  class="jobs-search-input"
                  placeholder="Nhập tên vị trí việc làm..."
                  autocomplete="off"
                />
                <button id="jobSearchBtn" class="jobs-search-btn">Tìm kiếm</button>
              </div>
            </div>

            <p id="resultCount" class="jobs-result-count">Đang tải dữ liệu...</p>

            <section class="jobs-result-panel">
              <div id="jobList" class="jobs-result-list"></div>

              <div id="emptyState" class="jobs-empty-state" style="display: none;">
                <p>Không tìm thấy dữ liệu tương ứng.</p>
              </div>
            </section>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="../assets/js/jobs.js"></script>
</body>
</html>
