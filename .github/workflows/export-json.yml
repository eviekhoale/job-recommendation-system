name: Export Excel to JSON

on:
  push:
    paths:
      - "raw_data/**"
      - "scripts/export_all_json.py"
      - "scripts/enrich_job_kkt.py"
      - "tools/build-position-profiles.js"
      - ".github/workflows/export-json.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl

      - name: Export base JSON files from Excel
        run: |
          python scripts/export_all_json.py

      - name: Enrich job KST from jobs and entities
        run: |
          python scripts/enrich_job_kkt.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build position profile JSON
        run: |
          node tools/build-position-profiles.js

      - name: Commit generated JSON files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/*.json

          if [ -d reports ]; then
            git add reports/*.json || true
          fi

          if git diff --cached --quiet; then
            echo "No generated JSON changes to commit."
          else
            git commit -m "Auto-export, enrich KST, and build position profiles"
            git push
          fi
