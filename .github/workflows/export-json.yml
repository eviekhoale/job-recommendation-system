name: Export Excel to JSON

on:
  push:
    paths:
      - 'raw_data/**'
      - 'scripts/export_all_json.py'
      - '.github/workflows/export-json.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl

      - name: Run export script
        run: |
          python scripts/export_all_json.py

      - name: Commit generated JSON files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git diff --cached --quiet || git commit -m "Auto-export JSON from Excel"
          git push
